<!doctype html>
<html lang="en" data-theme="terminal">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e0b" />
    <title>Perry Budget</title>
    <script>
      // Runtime config. The server replaces these markers with the real ingress
      // path; in the Vite dev server they stay as markers and are sanitized to
      // "" by src/api.ts (see clean()).
      window.__INGRESS__ = "__INGRESS_PATH__";
      window.__ROUTER_BASE__ = "__ROUTER_BASE_PATH__";
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("pb-theme");
        if (t === "terminal" || t === "bubbly")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
